server {
    listen 80;
    server_name arsclinic.ru www.arsclinic.ru;

    location /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name arsclinic.ru www.arsclinic.ru;

    ssl_certificate /etc/letsencrypt/live/arsclinic.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/arsclinic.ru/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    client_max_body_size 256k;
    server_tokens off;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), geolocation=(), microphone=(), payment=(), usb=()" always;

    access_log /var/log/nginx/arsclinic.access.log;
    error_log /var/log/nginx/arsclinic.error.log warn;

    location /static/ {
        alias /var/www/arsclinic/current/server/staticfiles/;
        autoindex off;
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
    }

    location /media/ {
        alias /var/www/arsclinic/shared/media/;
        autoindex off;
        expires 1h;
        add_header Cache-Control "private, max-age=3600";
    }

    location / {
        proxy_pass http://127.0.0.1:8010;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
        proxy_read_timeout 30s;
        proxy_connect_timeout 5s;
    }
}
